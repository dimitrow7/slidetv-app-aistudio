name: Release APK (AI Studio)

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.3.1'

      # Extract version name from tag (v1.2.3 → 1.2.3) BEFORE the build
      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > ${{ github.workspace }}/keystore.jks

      # VERSION_CODE = github.run_number (always increases — used for OTA comparison)
      # VERSION_NAME = tag without the 'v' prefix (e.g. "1.2.3")
      - name: Build Release APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/keystore.jks
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          VERSION_CODE: ${{ github.run_number }}
          VERSION_NAME: ${{ steps.version.outputs.VERSION }}
        run: gradle assembleRelease

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "SlideTV AI Studio v${{ steps.version.outputs.VERSION }}"
          body: |
            ## SlideTV AI Studio v${{ steps.version.outputs.VERSION }}

            **Version code:** ${{ github.run_number }}

            ### Direct installation (Android TV / TV Box)
            1. Download the `.apk` file below
            2. Transfer to your Android TV / TV Box
            3. Install via file manager or `adb install`
          files: |
            app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false

      # Notify SlideTV backend so all paired devices receive OTA update via poll API.
      # Requires SLIDETV_ADMIN_SECRET set in GitHub repository Secrets.
      - name: Notify SlideTV backend of new version
        env:
          SLIDETV_ADMIN_SECRET: ${{ secrets.SLIDETV_ADMIN_SECRET }}
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "Uploading $APK_PATH to SlideTV backend..."
          curl -X POST https://app.slidetv.eu/api/admin/app-update \
            -H "Authorization: Bearer $SLIDETV_ADMIN_SECRET" \
            -F "version_code=${{ github.run_number }}" \
            -F "version_name=${{ steps.version.outputs.VERSION }}" \
            -F "apk=@$APK_PATH" \
            --fail \
            --silent \
            --show-error
          echo "Backend notified successfully"
